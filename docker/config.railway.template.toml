# Railway dispatch-service config TEMPLATE.
# entrypoint.sh runs envsubst on this file at container startup.
# Safe to commit — contains no secrets.

[server]
host = "0.0.0.0"
# Railway injects $PORT for the public ingress route; entrypoint defaults
# to 7700 when running locally without Railway.
port = ${PORT}

[indexer]
service_provider_address = "${SERVICE_PROVIDER_ADDRESS}"
operator_private_key     = "${DISPATCH_OPERATOR_PRIVATE_KEY}"

[tap]
data_service_address      = "0x7101D5C1A5c89C3647F5118da118E56C023bA0b9"
# Empty list = accept any signer (open to all gateways), matching cargopete's
# own provider deployment. Diagnosed 2026-05-06 in Discord with petko: a
# non-empty whitelist became a strict filter that rejected Lodestar's current
# gateway signer, causing zero traffic. Empty here is safer than maintaining
# a whitelist that drifts as Lodestar rotates keys.
# History:
#   c6aa958 (2026-04-26) added 0x7D14… per initial cargopete docs
#   5374240 (2026-04-26) reverted to empty per cargopete follow-up
#   a2e2557 (2026-04-26) re-added 0x7D14… per re-clarified docs
#   THIS COMMIT (2026-05-06) back to empty per Discord triage with petko —
#   whitelist matched the wrong/stale signer; open mode is the canonical config.
authorized_senders        = []
eip712_domain_name        = "GraphTallyCollector"
eip712_chain_id           = 42161
eip712_verifying_contract = "0x8f69F5C07477Ac46FBc491B1E6D91E2bb0111A9e"
escrow_check_rpc_url      = "${DISPATCH_ARBITRUM_RPC}"
# Public Lodestar gateway — service POSTs receipts to ${aggregator_url}/rav/aggregate
aggregator_url            = "${DISPATCH_AGGREGATOR_URL}"
# Bypass per-consumer credit limit + escrow check for trusted gateways.
# Without this, Lodestar's gateway as payer hits the 0.1 GRT credit gate after
# ~10 served queries (diagnosed 2026-05-07: WARN consumer credit limit reached
# payer=0x7D14ae5f... served=0.10004 GRT threshold=0.1 GRT). The bypass is
# safe because the gateway has on-chain escrow and is a trusted signer; the
# credit gate exists to protect against unknown freeloaders, not the gateway.
bypass_consumers          = ["0x7D14ae5f20cc2f6421317386Aa8E79e8728353d9"]

[chains]
supported = [42161, 8453]

[chains.backends]
"42161" = "${DISPATCH_ARBITRUM_BACKEND}"
# Base mainnet. Default to drpc.org public endpoint if env var unset.
# Upgrade to Pinax / Chainstack / Alchemy if QoS scoring drops or rate
# limits hit. Archive + traces required for Debug-tier provider serving.
"8453"  = "${DISPATCH_BASE_BACKEND}"

[database]
url = "${DATABASE_URL}"

[collector]
arbitrum_rpc_url      = "${DISPATCH_ARBITRUM_RPC}"
collect_interval_secs = 3600
