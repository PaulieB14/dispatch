# Railway config-as-code for the dispatch-service deployment.
# Tells Railway to use the envsubst-aware Dockerfile.railway, not the
# default Dockerfile.service. Healthcheck uses the binary's /health endpoint.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.railway"
# Skip rebuilds for doc/script-only changes — keeps the provider online
# while iterating on README, RFCs, agent cards, etc.
watchPatterns = [
    "crates/**",
    "Cargo.toml",
    "Cargo.lock",
    "rust-toolchain.toml",
    "docker/**",
    "railway.toml",
]

[deploy]
healthcheckPath = "/health"
# 60s is plenty for a Rust service that boots in <30s. The previous 300s
# left a sick deploy looking healthy for 5 min before failover.
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
# No max-retries cap: a payments-on-the-line provider shouldn't go dark
# permanently after 10 transient failures (e.g. a brief Alchemy hiccup
# during boot). Railway will keep restarting on failure.
